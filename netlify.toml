# Netlify configuration for Align (Expo Web SPA)

[build]
  command = "npx expo export --platform web"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NODE_OPTIONS = "--max-old-space-size=4096"
  EXPO_NO_TELEMETRY = "1"
  CI = "1"
  # EXPO_PUBLIC_GROQ_API_KEY must be set in Netlify Dashboard → Environment Variables

# ─── SPA fallback ─────────────────────────────────────────────────────────────
# All routes (including /auth/callback) serve index.html so React Navigation
# handles the route client-side instead of returning a 404.
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
