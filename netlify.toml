# Netlify configuration for Align (Expo Web SPA)
# ─── All traffic permanently redirected to Vercel ─────────────────────────────

[build]
  command = "echo 'Redirecting to Vercel'"
  publish = "dist"

# ─── Permanent redirect: Netlify → Vercel ─────────────────────────────────────
# Anyone visiting talent-logic-app.netlify.app/* gets sent to vague-alpha.vercel.app
[[redirects]]
  from   = "/*"
  to     = "https://vague-alpha.vercel.app/:splat"
  status = 301
  force  = true
