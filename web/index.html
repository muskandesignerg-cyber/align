<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />

    <!--
      viewport-fit=cover  → fills full screen including notch/Dynamic Island
      maximum-scale=1     → prevents accidental pinch-zoom on mobile
      user-scalable=no    → locks zoom on mobile browsers
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />

    <!-- PWA / mobile browser meta -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#ffffff" />

    <title>Align</title>

    <style id="expo-reset">
      *, *::before, *::after {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        /* dvh = dynamic viewport height, shrinks when mobile browser chrome appears */
        height: 100dvh;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* On desktop (≥768px): dark background behind the phone shell */
      body {
        background-color: #0F1117;
      }

      /* On mobile (<768px): white background, full screen */
      @media (max-width: 767px) {
        body {
          background-color: #ffffff;
        }
      }

      /* Root element — always full viewport */
      #root {
        display: flex;
        flex: 1;
        width: 100%;
        height: 100%;
        height: 100dvh;
        /* Safe area padding — only active when viewport-fit=cover
           and device has a notch (iOS). On desktop this is 0. */
        padding-top: env(safe-area-inset-top, 0px);
        padding-bottom: env(safe-area-inset-bottom, 0px);
        padding-left: env(safe-area-inset-left, 0px);
        padding-right: env(safe-area-inset-right, 0px);
      }
    </style>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
