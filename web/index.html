<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />

    <!-- PWA / mobile browser meta -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#ffffff" />

    <title>Align</title>

    <style id="expo-reset">
      *, *::before, *::after {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        height: 100dvh;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Desktop: dark background behind the phone shell */
      body {
        background-color: #0F1117;
      }

      /* Mobile (<768px): white background, full screen */
      @media (max-width: 767px) {
        body {
          background-color: #ffffff;
        }
      }

      /* Root — full viewport, NO extra padding.
         Safe area insets are handled by SafeAreaProvider in React. */
      #root {
        display: flex;
        flex: 1;
        width: 100%;
        height: 100%;
        height: 100dvh;
      }
    </style>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
