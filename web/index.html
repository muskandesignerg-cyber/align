<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />

    <!--
      viewport-fit=cover  → fills the full screen including iPhone notch/Dynamic Island
      maximum-scale=1     → prevents accidental pinch-zoom on mobile
      user-scalable=no    → locks the zoom on mobile browsers
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />

    <!-- Mobile web app behaviour -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#ffffff" />

    <title>Align</title>

    <style id="expo-reset">
      /* ─── Reset ──────────────────────────────────────────────── */
      *, *::before, *::after {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html {
        height: 100%;
        /* dvh = dynamic viewport height — shrinks when mobile browser chrome appears */
        height: 100dvh;
      }

      body {
        margin: 0;
        padding: 0;
        height: 100%;
        height: 100dvh;
        overflow: hidden;

        /* Desktop: dark background on the sides so only the phone frame is visible */
        background-color: #000000;

        /* Improve font rendering */
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* ─── Root container ──────────────────────────────────────── */
      #root {
        display: flex;
        flex: 1;
        height: 100%;
        height: 100dvh;

        /*
          On desktop: cap at 430px (widest phone) and centre.
          On mobile: fills the screen edge-to-edge.
        */
        max-width: 430px;
        margin: 0 auto;
        overflow: hidden;
        position: relative;

        /* White background for the app itself */
        background-color: #ffffff;

        /*
          Safe-area insets — these come from the browser when viewport-fit=cover
          is set. They ensure content never hides behind the notch, status bar,
          or the iOS home indicator.
        */
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
    </style>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
